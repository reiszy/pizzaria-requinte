<!doctype html>
<html lang="pt-br"><head><meta charset="utf-8">
<title>Login - Pizzaria Requinte</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{background:linear-gradient(135deg,#8a1c20,#c1272d);min-height:100vh;display:flex;align-items:center;}
.card{border:none;border-radius:1rem;box-shadow:0 20px 60px rgba(0,0,0,.3);}</style></head>
<body><div class="container"><div class="row justify-content-center"><div class="col-md-4">
<div class="card p-4"><h3 class="text-center mb-1">🍕 PIZZARIA REQUINTE</h3>
<p class="text-center text-muted mb-4">Acesso ao sistema</p>
{% with msgs = get_flashed_messages(with_categories=true) %}{% for cat,m in msgs %}<div class="alert alert-{{cat}}">{{m}}</div>{% endfor %}{% endwith %}
<form method="post">{{ form.hidden_tag() }}
  <div class="mb-3"><label class="form-label">Email</label>{{ form.email(class="form-control") }}</div>
  <div class="mb-3"><label class="form-label">Senha</label>{{ form.senha(class="form-control") }}</div>
  <button class="btn btn-danger w-100">Entrar</button>
</form>
<p class="text-center text-muted mt-3 small">admin@requinte.com / admin123</p>
</div></div></div></div></body></html>
