{% extends "base.html" %}{% block content %}
<div class="d-flex justify-content-between mb-3"><h2>Bebidas</h2>
<a href="{{ url_for('cardapio.bebida_nova') }}" class="btn btn-danger"><i class="bi bi-plus"></i> Nova</a></div>
<table class="table bg-white"><thead><tr><th>Nome</th><th>Categoria</th><th>Valor</th><th>Estoque</th><th></th></tr></thead><tbody>
{% for b in items.items %}<tr><td>{{b.nome}}</td><td>{{b.categoria or ''}}</td><td>R$ {{"%.2f"|format(b.valor)}}</td><td>{{b.estoque_atual}}</td>
<td><a class="btn btn-sm btn-outline-primary" href="{{url_for('cardapio.bebida_editar',bid=b.id)}}"><i class="bi bi-pencil"></i></a>
<form method="post" action="{{url_for('cardapio.bebida_excluir',bid=b.id)}}" style="display:inline" onsubmit="return confirm('Excluir?')">
<button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button></form></td></tr>{% endfor %}
</tbody></table>{% endblock %}
