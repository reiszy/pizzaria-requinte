{% extends "base.html" %}{% block content %}
<div class="d-flex justify-content-between mb-3"><h2>Pizzas</h2>
<a href="{{ url_for('cardapio.pizza_nova') }}" class="btn btn-danger"><i class="bi bi-plus"></i> Nova Pizza</a></div>
<table class="table bg-white"><thead><tr><th>Nome</th><th>Tamanho</th><th>Valor</th><th>Ativo</th><th></th></tr></thead><tbody>
{% for p in items.items %}<tr><td>{{p.nome}}</td><td>{{p.tamanho}}</td><td>R$ {{"%.2f"|format(p.valor)}}</td>
<td>{% if p.ativo %}<span class="badge bg-success">Sim</span>{% else %}<span class="badge bg-secondary">Não</span>{% endif %}</td>
<td><a class="btn btn-sm btn-outline-primary" href="{{url_for('cardapio.pizza_editar',pid=p.id)}}"><i class="bi bi-pencil"></i></a>
<form method="post" action="{{url_for('cardapio.pizza_excluir',pid=p.id)}}" style="display:inline" onsubmit="return confirm('Excluir?')">
<button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button></form></td></tr>{% endfor %}
</tbody></table>{% endblock %}
