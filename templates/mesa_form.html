{% extends "base.html" %}{% block content %}
<h2>{{titulo}}</h2>
<form method="post" class="row g-3 bg-white p-3 rounded shadow-sm">{{ form.hidden_tag() }}
<div class="col-md-3"><label class="form-label">Número</label>{{ form.numero(class="form-control") }}</div>
<div class="col-md-3"><label class="form-label">Capacidade</label>{{ form.capacidade(class="form-control") }}</div>
<div class="col-md-3"><label class="form-label">Status</label>{{ form.status(class="form-select") }}</div>
<div class="col-12"><button class="btn btn-danger">Salvar</button>
<a class="btn btn-link" href="{{ url_for('mesas.listar') }}">Voltar</a></div>
</form>{% endblock %}
